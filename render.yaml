services:
  - type: web
    name: auto-shop-pos-backend
    env: node
    buildCommand: npm ci
    startCommand: npm run start:backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://auto-shop-pos-frontend.netlify.app
